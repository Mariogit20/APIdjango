    <script>

      function getCookie(name){
        let cookieValue = null;
        if(document.cookie && document.cookie !== ''){
          const cookies = document.cookie.split(';');
          console.log(cookies);

          for (let i = 0; i < cookies.length; i++){
            const cookie = cookies[i].trim();         // SUPPRIMER   les   ESPACE AVANT   et    ESPACE APRES
            if(cookie.substring(0, name.length + 1) === (name + '=')){
              cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
              break;
            }
          }
        }
        return cookieValue;
      }


      let Form = document.querySelector('#contactForm')
      Form.addEventListener('submit', async (event)=>{
        event.preventDefault()   // ARRETER L'   ACTION PAR DEFAUT    qui est le    ACTION de     CHARGEMENT PAR DEFAUT DE LA PAGE WEB

        const csrftoken = getCookie('csrftoken');       // CSRF TOKEN   =   """"SECURISATION   DU   input"""" du    FORMULAIRE   ,    """"PREVENTION""""   CONTRE LE   HACKER

        let data = {
          nom: document.querySelector('#nom').value,               //  nom:   =    DANS LE    models.py
          email: document.querySelector('#email').value,
          message:document.querySelector('#sms').value     //  message:   =    DANS LE    models.py
        }

console.log("data.nom = " + data.nom)
console.log("data.email = " + data.email)
console.log("data.message = " + data.message)

        let response = await fetch('http://127.0.0.1:8000/contact/',
        {
          method: 'POST',
          headers: {'Content-type':'application/json','X-CSRFToken':csrftoken},
          body : JSON.stringify(data)              //   stringify  =  AVADIKA    ""string"""    ilay    OBJET   data
        })
        if(response.ok){
          alert('Message envoyé avec succès')
          event.target.reset()
        }
        else{
          alert('erreur d\'envoye')

        }
      })

 
    </script>
